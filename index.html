    // Populate filter dropdowns dynamically based on the data
    function populateFilters(data) {
      const tagValues = [...new Set(data.map(row => row.tag).filter(Boolean))].sort();
      const publisherValues = [...new Set(data.map(row => row.publisher).filter(Boolean))].sort();
      const languageValues = [...new Set(data.map(row => row.language).filter(Boolean))].sort();

      fillSelect('tag', tagValues, 'All Tags');
      fillSelect('publisher', publisherValues, 'All Publishers');
      fillSelect('language', languageValues, 'All Languages');
    }

    function fillSelect(id, values, allLabel) {
      const select = document.getElementById(id);
      const previousValue = select.value;
      select.innerHTML = `<option value="">${allLabel}</option>` +
        values.map(v => `<option value="${v}">${v}</option>`).join('');
      // Restore previous selection if it still exists among the options
      if (values.includes(previousValue)) {
        select.value = previousValue;
      }
    }

    // Current sort state: which field is active and in which direction
    let currentSortField = null;
    let currentSortDirection = 'asc';

    // Called when a table header is clicked
    function setSort(field) {
      if (currentSortField === field) {
        // Same column clicked again -> toggle direction
        currentSortDirection = currentSortDirection === 'asc' ? 'desc' : 'asc';
      } else {
        currentSortField = field;
        currentSortDirection = 'asc';
      }
      updateSortArrows();
      filterContent();
    }

    // Update the arrow indicators in the table header row
    function updateSortArrows() {
      document.querySelectorAll('#tableHead th').forEach(th => {
        const arrow = th.querySelector('.sort-arrow');
        if (!arrow) return;
        if (th.dataset.field === currentSortField) {
          arrow.textContent = currentSortDirection === 'asc' ? ' ↑' : ' ↓';
        } else {
          arrow.textContent = '';
        }
      });
    }

    // Sort an array of rows based on the currently active column and direction
    function sortData(data) {
      if (!currentSortField) return data;

      const field = currentSortField;
      const direction = currentSortDirection;

      const sorted = [...data].sort((a, b) => {
        let valA = a[field];
        let valB = b[field];

        if (field === 'created_at') {
          valA = new Date(valA).getTime();
          valB = new Date(valB).getTime();
        } else if (field === 'price') {
          valA = Number(valA) || 0;
          valB = Number(valB) || 0;
        } else {
          valA = (valA || '').toString().toLowerCase();
          valB = (valB || '').toString().toLowerCase();
        }

        if (valA < valB) return direction === 'asc' ? -1 : 1;
        if (valA > valB) return direction === 'asc' ? 1 : -1;
        return 0;
      });

      return sorted;
    }

    // Track which rows are currently expanded (persists across re-renders)
    const expandedIds = new Set();

    function toggleExpand(id) {
      if (expandedIds.has(id)) {
        expandedIds.delete(id);
      } else {
        expandedIds.add(id);
      }
      filterContent();
    }

    function showData(data) {
      const table = document.getElementById('table');
      table.innerHTML = '';
      document.getElementById('count').textContent = data.length;

      if (data.length === 0) {
        table.innerHTML = '<tr><td colspan="8" class="px-6 py-8 text-center" style="color: #6c6eb6;">No results found</td></tr>';
        return;
      }

      data.forEach(row => {
        const date = new Date(row.created_at).toLocaleDateString('en-US');
        const price = row.price === 0 || row.price === null || row.price === undefined
          ? 'Free'
          : `€${Number(row.price).toFixed(2)}`;
        const isExpanded = expandedIds.has(row.id);

        const tr = document.createElement('tr');
        tr.style.borderBottom = isExpanded ? 'none' : '1px solid #66c7f4';
        tr.className = 'hover:bg-gray-50 transition duration-150 cursor-pointer';
        tr.onclick = () => toggleExpand(row.id);
        tr.innerHTML = `
          <td class="px-4 py-4 text-center">
            <svg class="inline-block transition-transform duration-200" style="transform: rotate(${isExpanded ? '90deg' : '0deg'});" width="12" height="12" viewBox="0 0 12 12" xmlns="http://www.w3.org/2000/svg">
              <path d="M2 1 L10 6 L2 11 Z" fill="#0f88ff"/>
            </svg>
          </td>
          <td class="px-6 py-4">
            <span class="font-semibold" style="color: #0f88ff;">${row.name}</span>
          </td>
          <td class="px-6 py-4">
            <span class="inline-block text-xs font-bold px-3 py-1 rounded-full" style="background-color: #b8ff00; color: #000000;">
              ${row.tag || '–'}
            </span>
          </td>
          <td class="px-6 py-4" style="color: #000000;">${row.language || '–'}</td>
          <td class="px-6 py-4" style="color: #000000;">${row.publisher || '–'}</td>
          <td class="px-6 py-4" style="color: #000000;">${price}</td>
          <td class="px-6 py-4">
            <a href="${row.link}" target="_blank" onclick="event.stopPropagation()" class="hover:underline font-semibold" style="color: #0f88ff;">
              🔗 Link
            </a>
          </td>
          <td class="px-6 py-4 text-sm" style="color: #6c6eb6;">${date}</td>
        `;
        table.appendChild(tr);

        if (isExpanded) {
          const detailTr = document.createElement('tr');
          detailTr.style.borderBottom = '1px solid #66c7f4';
          detailTr.innerHTML = `
            <td colspan="8" class="px-6 pb-5 pt-0" style="background-color: #f7faff;">
              <p class="leading-relaxed" style="color: #000000;">${row.description.replace(/\n/g, '<br>')}</p>
            </td>
          `;
          table.appendChild(detailTr);
        }
      });
    }

    function filterContent() {
      const search = document.getElementById('search').value.toLowerCase();
      const tag = document.getElementById('tag').value;
      const publisher = document.getElementById('publisher').value;
      const language = document.getElementById('language').value;

      const filtered = allData.filter(row =>
        (!search || row.name.toLowerCase().includes(search) || row.description.toLowerCase().includes(search)) &&
        (!tag || row.tag === tag) &&
        (!publisher || row.publisher === publisher) &&
        (!language || row.language === language)
      );

      showData(sortData(filtered));
    }

    // Filter on every input
    document.getElementById('search').addEventListener('input', filterContent);
    document.getElementById('tag').addEventListener('change', filterContent);
    document.getElementById('publisher').addEventListener('change', filterContent);
    document.getElementById('language').addEventListener('change', filterContent);

    // Initial setup on load — placed at the end so every function/variable
    // it depends on (populateFilters, showData, sortData, expandedIds) already exists
    populateFilters(allData);
    showData(sortData(allData));
  </script>
</body>
</html>
